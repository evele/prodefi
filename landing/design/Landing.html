<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ProDefi — Predicciones del Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #07090F;
    --ink-2: #0E131F;
    --ink-3: #161D2D;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --bone: #F4F1EA;
    --bone-2: #D9D4C5;
    --muted: #8C93A6;
    --celeste: #74ACDF;        /* celeste argentino */
    --celeste-2: #9CC6EB;
    --celeste-deep: #2B6FA8;
    --lima: #C8FF3D;            /* acento ProDefi */
    --lima-deep: #7FBE1A;
    --warm: #F2C14E;
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--bone); font-family: 'Archivo', system-ui, sans-serif; }
  body { overflow-x: hidden; }

  /* selection */
  ::selection { background: var(--lima); color: var(--ink); }

  /* Outer stage so we can preview mobile/desktop side-by-side via Tweaks */
  .stage {
    min-height: 100vh;
    background: var(--ink);
    display: flex;
    justify-content: center;
    padding: 0;
  }
  .stage[data-mode="mobile"] {
    padding: 24px 16px 40px;
    background: radial-gradient(ellipse at top, #0F1626 0%, #06080F 60%);
  }
  .stage[data-mode="mobile"] .device {
    width: 390px;
    max-width: 100%;
    border-radius: 36px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);
    overflow: hidden;
  }
  .stage[data-mode="desktop"] .device { width: 100%; }

  /* type system */
  .display { font-family: 'Anton', 'Archivo Black', sans-serif; letter-spacing: -0.01em; line-height: 0.92; text-transform: uppercase; }
  .editorial { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .eyebrow.celeste { color: var(--celeste); }
  .eyebrow.lima { color: var(--lima); }

  a { color: inherit; }
  button { font-family: inherit; }

  /* AFA-style ribbon (sutil) */
  .ribbon-celeste {
    background-image: linear-gradient(180deg, var(--celeste) 0%, var(--celeste) 33%, var(--bone) 33%, var(--bone) 66%, var(--celeste) 66%, var(--celeste) 100%);
  }

  /* loader fallback */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
</style>
</head>
<body>
  <div id="root"><div class="loading">CARGANDO PRODEFI…</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
