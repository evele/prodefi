[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
test        = "test"
script      = "script"
solc_version= "0.8.27"

[profile.dev]
optimizer = true
optimizer_runs = 200

[profile.ci]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
goerli  = "${GOERLI_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
